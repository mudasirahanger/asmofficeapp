</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useContext, createContext, useRef } = React;

/* ================================================================

const DEPARTMENTS = [
  {id:'video',           name:'Video Production',           headId:3, color:'blue'},
  {id:'web',             name:'Web & Digital',              headId:4, color:'emerald'},
  {id:'kashmir_impulse', name:'Kashmir Impulse',            headId:5, color:'violet'},
  {id:'social',          name:'Social Media',               headId:6, color:'pink'},
  {id:'ecommerce',       name:'E-Commerce (Kashmir Brand)', headId:6, color:'amber'},
  {id:'operations',      name:'Operations & Admin',         headId:7, color:'slate'},
];

const DEPT_COLORS = {
  blue:   {bg:'bg-blue-50',   text:'text-blue-700',   border:'border-blue-200',   badge:'bg-blue-100 text-blue-700'},
  emerald:{bg:'bg-emerald-50',text:'text-emerald-700',border:'border-emerald-200',badge:'bg-emerald-100 text-emerald-700'},
  violet: {bg:'bg-violet-50', text:'text-violet-700', border:'border-violet-200', badge:'bg-violet-100 text-violet-700'},
  pink:   {bg:'bg-pink-50',   text:'text-pink-700',   border:'border-pink-200',   badge:'bg-pink-100 text-pink-700'},
  amber:  {bg:'bg-amber-50',  text:'text-amber-700',  border:'border-amber-200',  badge:'bg-amber-100 text-amber-700'},
  slate:  {bg:'bg-slate-50',  text:'text-slate-700',  border:'border-slate-200',  badge:'bg-slate-100 text-slate-600'},
};

const STATUS_MAP = {
  assigned:    {label:'Assigned',    cls:'bg-blue-100 text-blue-700'},
  in_progress: {label:'In Progress', cls:'bg-amber-100 text-amber-700'},
  completed:   {label:'Completed',   cls:'bg-green-100 text-green-700'},
  billed:      {label:'Billed',      cls:'bg-violet-100 text-violet-700'},
};
const PRIORITY_MAP = {
  low:    {label:'Low',    cls:'bg-gray-100 text-gray-500'},
  medium: {label:'Medium', cls:'bg-yellow-100 text-yellow-700'},
  high:   {label:'High',   cls:'bg-red-100 text-red-600'},
};
const LEAVE_STATUS = {
  pending:  'bg-amber-100 text-amber-700',
  approved: 'bg-green-100 text-green-700',
  rejected: 'bg-red-100 text-red-600',
};
const ATT_STATUS = {
  present:  'bg-green-100 text-green-700',
  absent:   'bg-red-100 text-red-600',
  half_day: 'bg-amber-100 text-amber-700',
  on_leave: 'bg-blue-100 text-blue-700',
  holiday:  'bg-violet-100 text-violet-700',
};

/* ================================================================
   STORAGE
   ================================================================ */
const S = {
  get: k => { try{ return JSON.parse(localStorage.getItem('oms_'+k)) ?? [] }catch{ return [] } },
  set: (k,v) => localStorage.setItem('oms_'+k, JSON.stringify(v)),
  val: k => { try{ return JSON.parse(localStorage.getItem('oms_'+k)) }catch{ return null } },
  put: (k,v) => localStorage.setItem('oms_'+k, JSON.stringify(v)),
};

function seed() {
  if (S.val('init')) return;
  S.set('users', SEED_USERS);
  S.set('projects', []);
  S.set('progress', []);
  S.set('notifs', []);
  S.set('attendance', []);
  S.set('leaves', []);
  S.set('settings', { gst: '', pan: '', phone: '', email: '', website: '', address: '', bankName: '', accountNo: '', branchIfsc: '', logoUrl: '' });
  S.put('init', true);
}

/* ================================================================
   UTILS
   ================================================================ */
const today = () => new Date().toISOString().split('T')[0];
const newId = arr => arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1;
const fmtD  = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const fmtDT = d => d ? new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
const initials = n => (n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
const AVATAR_COLORS = ['bg-indigo-500','bg-blue-500','bg-emerald-500','bg-violet-500','bg-pink-500','bg-amber-500','bg-teal-500','bg-red-500','bg-cyan-500','bg-orange-500'];
const avatarCls = id => AVATAR_COLORS[(id||0) % AVATAR_COLORS.length];
const deptName  = id => DEPARTMENTS.find(d=>d.id===id)?.name || id;
const deptColor = id => DEPARTMENTS.find(d=>d.id===id)?.color || 'slate';

function isOverdue(deadline, status) {
  if (!deadline || ['completed','billed'].includes(status)) return false;
  return deadline < today();
}
function daysLeft(deadline) {
  if (!deadline) return null;
  return Math.ceil((new Date(deadline) - new Date()) / 86400000);
}

/* ================================================================
   CONTEXT
   ================================================================ */
const Ctx = createContext();
const useApp = () => useContext(Ctx);

function AppProvider({children}) {
  const [me,      setMe]      = useState(() => S.val('session'));
  const [page,    setPage]    = useState('dashboard');
  const [params,  setParams]  = useState({});
  const [users,   setUsers]   = useState(() => S.get('users'));
  const [projects,setProjects]= useState(() => S.get('projects'));
  const [progress,setProgress]= useState(() => S.get('progress'));
  const [notifs,  setNotifs]  = useState(() => S.get('notifs'));
  const [att,     setAtt]     = useState(() => S.get('attendance'));
  const [leaves,  setLeaves]  = useState(() => S.get('leaves'));
  const [settings,setSettings]= useState(() => {
    let s = S.val('settings');
    if(!s || Array.isArray(s)) s = { gst: '', pan: '', phone: '', email: '', website: '', address: '', bankName: '', accountNo: '', branchIfsc: '', logoUrl: '' };
    return s;
  });

  /* refresh from storage */
  const reload = () => {
    setUsers(S.get('users')); setProjects(S.get('projects'));
    setProgress(S.get('progress')); setNotifs(S.get('notifs'));
    setAtt(S.get('attendance')); setLeaves(S.get('leaves'));
    setSettings(S.val('settings') || {});
  };

  /* missed deadline check on login */
  useEffect(() => {
    if (!me) return;
    const projs = S.get('projects');
    const ns    = S.get('notifs');
    const todayStr = today();
    let changed = false;
    projs.forEach(p => {
      if (!isOverdue(p.deadline, p.status)) return;
      const key = `dl_${p.id}_${todayStr}`;
      if (ns.find(n=>n.key===key)) return;
      const usrs = S.get('users');
      const targets = new Set(usrs.filter(u=>u.role==='founder').map(u=>u.id));
      if (p.assignedTo)    targets.add(p.assignedTo);
      if (p.subAssignedTo) targets.add(p.subAssignedTo);
      targets.forEach(uid => ns.push({
        id: newId(ns), userId: uid, key,
        message: `⚠️ Deadline missed: "${p.title}" was due ${fmtD(p.deadline)}`,
        type:'deadline', read:false, projectId:p.id,
        createdAt: new Date().toISOString(),
      }));
      changed = true;
    });
    if (changed) { S.set('notifs', ns); setNotifs(ns); }
  }, [me]);

  /* helpers */
  const nav = (pg, p={}) => { setPage(pg); setParams(p); };
  const byId = id => users.find(u=>u.id===id);

  function login(username, password) {
    const u = S.get('users').find(u=>u.username===username && u.password===password);
    if (!u) return false;
    setMe(u); S.put('session', u); return true;
  }
  function logout() { setMe(null); S.put('session',null); nav('dashboard'); }

  function pushNotif(n) {
    const ns = S.get('notifs');
    ns.push({...n, id:newId(ns), read:false, createdAt:new Date().toISOString()});
    S.set('notifs',ns); setNotifs([...ns]);
    if (window.electronAPI) {
      // Only send native desktop notifications to the currently logged in user
      if (!me || n.userId === me.id) {
        window.electronAPI.sendNotification('Office Hub Notification', n.message, true);
      }
    }
  }

  function createProject(data) {
    const ps = S.get('projects');
    const p  = {...data, id:newId(ps), status:'assigned', createdBy:me.id,
                subAssignedTo:null, createdAt:new Date().toISOString(),
                updatedAt:new Date().toISOString(), completedAt:null, billedAt:null};
    ps.push(p); S.set('projects',ps); setProjects([...ps]);
    if (p.assignedTo) pushNotif({userId:p.assignedTo, message:`📋 New project assigned: "${p.title}"`, type:'assignment', projectId:p.id});
  }

  function updateProject(id, data) {
    const ps = S.get('projects');
    const idx = ps.findIndex(p=>p.id===id);
    if (idx<0) return;
    const old = ps[idx];
    ps[idx] = {...old, ...data, updatedAt:new Date().toISOString()};
    S.set('projects',ps); setProjects([...ps]);
    if (data.assignedTo && data.assignedTo !== old.assignedTo)
      pushNotif({userId:data.assignedTo, message:`📋 Project assigned to you: "${old.title}"`, type:'assignment', projectId:id});
    if (data.subAssignedTo && data.subAssignedTo !== old.subAssignedTo)
      pushNotif({userId:data.subAssignedTo, message:`📋 Task assigned to you: "${old.title}"`, type:'assignment', projectId:id});
  }

  function markComplete(id) {
    const ps = S.get('projects');
    const p  = ps.find(x=>x.id===id); if(!p) return;
    p.status='completed'; p.completedAt=new Date().toISOString(); p.updatedAt=p.completedAt;
    S.set('projects',ps); setProjects([...ps]);
    S.get('users').filter(u=>u.role==='founder').forEach(u=>
      pushNotif({userId:u.id, message:`✅ Project completed: "${p.title}"`, type:'completion', projectId:id}));
    S.get('users').filter(u=>u.role==='accounts').forEach(u=>
      pushNotif({userId:u.id, message:`💰 Ready for billing: "${p.title}"`, type:'billing', projectId:id}));
  }

  function markBilled(id) {
    const ps = S.get('projects');
    const p  = ps.find(x=>x.id===id); if(!p) return;
    p.status='billed'; p.billedAt=new Date().toISOString(); p.updatedAt=p.billedAt;
    S.set('projects',ps); setProjects([...ps]);
    S.get('users').filter(u=>u.role==='founder').forEach(u=>
      pushNotif({userId:u.id, message:`💰 Project billed: "${p.title}"`, type:'billing', projectId:id}));
  }

  function addProgress(data) {
    const pr = S.get('progress');
    pr.push({...data, id:newId(pr), userId:me.id, date:today(), createdAt:new Date().toISOString()});
    S.set('progress',pr); setProgress([...pr]);
    // auto-flip to in_progress
    const ps = S.get('projects');
    const p  = ps.find(x=>x.id===data.projectId);
    if (p && p.status==='assigned') { p.status='in_progress'; p.updatedAt=new Date().toISOString(); S.set('projects',ps); setProjects([...ps]); }
  }

  function readNotif(id) {
    const ns=S.get('notifs'); const n=ns.find(x=>x.id===id); if(n) n.read=true;
    S.set('notifs',ns); setNotifs([...ns]);
  }
  function readAll() {
    const ns=S.get('notifs'); ns.filter(n=>n.userId===me.id).forEach(n=>n.read=true);
    S.set('notifs',ns); setNotifs([...ns]);
  }

  function saveAttendance(data) {
    const ar=S.get('attendance');
    const idx=ar.findIndex(a=>a.userId===data.userId&&a.date===data.date);
    if(idx>=0) ar[idx]={...ar[idx],...data}; else ar.push({...data, id:newId(ar)});
    S.set('attendance',ar); setAtt([...ar]);
  }

  function applyLeave(data) {
    const ls=S.get('leaves');
    const leave={...data, id:newId(ls), userId:me.id, status:'pending', approvedBy:null, appliedAt:new Date().toISOString()};
    ls.push(leave); S.set('leaves',ls); setLeaves([...ls]);
    const mgr=users.find(u=>u.id===me.reportingTo);
    if(mgr) pushNotif({userId:mgr.id, message:`📅 Leave request from ${me.name}: ${fmtD(data.startDate)}–${fmtD(data.endDate)}`, type:'leave', projectId:null});
    S.get('users').filter(u=>u.role==='founder'&&u.id!==mgr?.id).forEach(u=>
      pushNotif({userId:u.id, message:`📅 Leave request from ${me.name}`, type:'leave', projectId:null}));
  }

  function decideLeave(id, status) {
    const ls=S.get('leaves');
    const l=ls.find(x=>x.id===id); if(!l) return;
    l.status=status; l.approvedBy=me.id;
    S.set('leaves',ls); setLeaves([...ls]);
    pushNotif({userId:l.userId, message:`📅 Your leave has been ${status}`, type:'leave', projectId:null});
  }

  function updateSettings(data) {
    S.set('settings', data);
    setSettings(data);
  }

  const myNotifs   = notifs.filter(n=>n.userId===me?.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const unreadCnt  = myNotifs.filter(n=>!n.read).length;

  const visibleProjects = p => {
    if (!me) return false;
    if (me.role==='founder') return true;
    if (me.role==='accounts') return ['completed','billed'].includes(p.status);
    if (me.role==='head') return me.departments.includes(p.assignedDept)||p.assignedTo===me.id||p.subAssignedTo===me.id;
    return p.assignedTo===me.id||p.subAssignedTo===me.id||me.departments.includes(p.assignedDept);
  };

  return (
    <Ctx.Provider value={{
      me, users, projects, progress, notifs:myNotifs, att, leaves,
      unreadCnt, page, params,
      nav, byId, login, logout,
      createProject, updateProject, markComplete, markBilled,
      addProgress, readNotif, readAll,
      saveAttendance, applyLeave, decideLeave,
      visibleProjects, reload, settings, updateSettings,
    }}>
      {children}
    </Ctx.Provider>
  );
}

/* ================================================================
   SHARED UI
   ================================================================ */
function Av({user, size='md'}) {
  const sz = size==='sm'?'w-7 h-7 text-[11px]':size==='lg'?'w-11 h-11 text-sm':'w-8 h-8 text-xs';
  return (
    <div className={`${sz} rounded-full flex items-center justify-center text-white font-bold flex-shrink-0 ${avatarCls(user?.id)}`}>
      {initials(user?.name)}
    </div>
  );
}

function Badge({cls, children}) {
  return <span className={`inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full ${cls}`}>{children}</span>;
}

function StatusBadge({status}) {
  const m=STATUS_MAP[status]||{label:status,cls:'bg-gray-100 text-gray-600'};
  return <Badge cls={m.cls}>● {m.label}</Badge>;
}
function PriBadge({priority}) {
  const m=PRIORITY_MAP[priority]||{label:priority,cls:'bg-gray-100 text-gray-500'};
  return <Badge cls={m.cls}>{m.label}</Badge>;
}

function Card({children, className=''}) {
  return <div className={`bg-white rounded-2xl shadow-sm border border-slate-100 ${className}`}>{children}</div>;
}

function Inp({label, icon, ...p}) {
  return (
    <div>
      {label&&<label className="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">{label}</label>}
      <div className="relative">
        {icon && <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">{icon}</div>}
        <input className={`w-full border border-slate-200 rounded-xl ${icon ? 'pl-10 pr-3' : 'px-3'} py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 bg-white`} {...p}/>
      </div>
    </div>
  );
}
function Sel({label, children, ...p}) {
  return (
    <div>
      {label&&<label className="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">{label}</label>}
      <select className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white" {...p}>{children}</select>
    </div>
  );
}
function Txta({label, ...p}) {
  return (
    <div>
      {label&&<label className="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">{label}</label>}
      <textarea className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none" rows={3} {...p}/>
    </div>
  );
}
function Btn({variant='primary', className='', children, ...p}) {
  const vs = {
    primary:   'bg-indigo-600 text-white hover:bg-indigo-700 active:bg-indigo-800',
    secondary: 'bg-slate-100 text-slate-700 hover:bg-slate-200',
    success:   'bg-emerald-600 text-white hover:bg-emerald-700',
    danger:    'bg-red-500 text-white hover:bg-red-600',
    warning:   'bg-amber-500 text-white hover:bg-amber-600',
    ghost:     'text-indigo-600 hover:bg-indigo-50',
  };
  return (
    <button className={`px-4 py-2 rounded-xl text-sm font-semibold transition-colors disabled:opacity-50 cursor-pointer ${vs[variant]} ${className}`} {...p}>
      {children}
    </button>
  );
}

function Modal({title, onClose, wide, children}) {
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className={`bg-white rounded-2xl shadow-2xl ${wide?'max-w-2xl':'max-w-md'} w-full max-h-[90vh] overflow-y-auto fade-in`}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
          <h2 className="text-base font-bold text-slate-800">{title}</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl w-7 h-7 flex items-center justify-center rounded-lg hover:bg-slate-100">✕</button>
        </div>
        <div className="px-6 py-5">{children}</div>
      </div>
    </div>
  );
}

function ProgBar({value}) {
  const v=Math.min(100,Math.max(0,value||0));
  const c=v===100?'bg-emerald-500':v>60?'bg-indigo-500':v>30?'bg-amber-500':'bg-red-400';
  return (
    <div>
      <div className="flex justify-between text-xs text-slate-400 mb-1"><span>Progress</span><span className="font-semibold">{v}%</span></div>
      <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
        <div className={`h-full rounded-full transition-all duration-500 ${c}`} style={{width:`${v}%`}}/>
      </div>
    </div>
  );
}

/* ================================================================
   NOTIFICATIONS BELL
   ================================================================ */
function NotifsDropdown() {
  const {me, notifs, readNotif, readAll, nav} = useApp();
  const [open, setOpen] = useState(false);
  const ref = useRef();
  const unread = notifs.filter(n=>!n.read).length;

  useEffect(()=>{
    const h=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);

  return (
    <div className="relative" ref={ref}>
      <button onClick={()=>setOpen(!open)} className="relative w-9 h-9 flex items-center justify-center text-slate-500 hover:text-slate-700 rounded-xl hover:bg-slate-100 transition-colors">
        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        {unread>0 && <span className="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center pulse-dot">{unread>9?'9+':unread}</span>}
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-2 w-96 bg-white rounded-2xl shadow-2xl border border-slate-100 z-50 fade-in flex flex-col max-h-[480px]">
          <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100">
            <span className="font-bold text-slate-800">Notifications</span>
            {unread>0 && <button onClick={readAll} className="text-xs text-indigo-600 hover:underline">Mark all read</button>}
          </div>
          <div className="overflow-y-auto flex-1">
            {notifs.length===0
              ? <div className="py-10 text-center text-slate-400 text-sm">All caught up! 🎉</div>
              : notifs.slice(0,25).map(n=>(
                  <div key={n.id} onClick={()=>{readNotif(n.id);if(n.projectId){nav('project',{id:n.projectId});setOpen(false);}}}
                    className={`px-4 py-3 border-b border-slate-50 last:border-0 cursor-pointer hover:bg-slate-50 transition-colors ${n.read?'':'bg-indigo-50/50'}`}>
                    <p className="text-sm text-slate-700 leading-snug">{n.message}</p>
                    <p className="text-[11px] text-slate-400 mt-0.5">{fmtDT(n.createdAt)}</p>
                  </div>
                ))
            }
          </div>
        </div>
      )}
    </div>
  );
}

function StatCard({label, value, icon, color='indigo'}) {
  const cs={indigo:'bg-indigo-50 text-indigo-600',emerald:'bg-emerald-50 text-emerald-600',amber:'bg-amber-50 text-amber-600',red:'bg-red-50 text-red-500',violet:'bg-violet-50 text-violet-600'};
  return (
    <Card className="p-5">
      <div className="flex items-center justify-between">
        <div><p className="text-slate-500 text-sm">{label}</p><p className="text-2xl font-bold text-slate-800 mt-0.5">{value}</p></div>
        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl ${cs[color]||cs.indigo}`}>{icon}</div>
      </div>
    </Card>
  );
}

function MiniProjectCard({proj, onClick}) {
  const {byId} = useApp();
  const creator = byId(proj.createdBy);
  const assignee = proj.assignedTo ? byId(proj.assignedTo) : null;
  const subAssignee = proj.subAssignedTo ? byId(proj.subAssignedTo) : null;
  const ov  = isOverdue(proj.deadline, proj.status);
  const dl  = daysLeft(proj.deadline);
  return (
    <div onClick={onClick} className={`rounded-2xl border p-4 cursor-pointer transition-all hover:shadow-md ${ov?'bg-red-50 border-red-200':'bg-white border-slate-100 hover:border-indigo-200'}`}>
      <div className="flex items-start justify-between gap-2 mb-2">
        <p className="font-semibold text-slate-800 text-sm line-clamp-1 flex-1">{proj.title}</p>
        <StatusBadge status={proj.status}/>
      </div>
      {proj.client && <p className="text-xs text-slate-400 mb-2">Client: {proj.client}</p>}
      <div className="flex items-end justify-between mt-2">
        <div className="flex flex-col gap-1.5">
          {creator && <div className="flex items-center gap-1.5"><Av user={creator} size="sm"/><span className="text-xs text-slate-500">By: {creator.name}</span></div>}
          {assignee && <div className="flex items-center gap-1.5"><Av user={assignee} size="sm"/><span className="text-xs text-slate-500">To: {assignee.name}</span></div>}
          {subAssignee && <div className="flex items-center gap-1.5"><Av user={subAssignee} size="sm"/><span className="text-xs text-slate-500">Sub: {subAssignee.name}</span></div>}
        </div>
        {proj.deadline && (
          <span className={`text-xs font-medium ${ov?'text-red-500':dl<=3?'text-amber-500':'text-slate-400'}`}>
            {ov ? `⚠ ${Math.abs(dl)}d late` : dl===0 ? '🔴 Today' : `${dl}d left`}
          </span>
        )}
      </div>
    </div>
  );
}

function DashboardPage() {
  const {me, projects, users, leaves, nav, visibleProjects} = useApp();
  const isFounder  = me.role==='founder';
  const isAccounts = me.role==='accounts';
  const isHead     = me.role==='head';
  const myProjects = projects.filter(visibleProjects);
  const active     = myProjects.filter(p=>['assigned','in_progress'].includes(p.status));
  const completed  = myProjects.filter(p=>p.status==='completed');
  const overdue    = myProjects.filter(p=>isOverdue(p.deadline,p.status));
  const pending    = leaves.filter(l=>l.status==='pending');

  return (
    <div>
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-slate-800">Welcome, {me.name} 👋</h1>
        <p className="text-slate-500 text-sm mt-0.5">{new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <StatCard label="Active Projects" value={active.length} icon="📁" color="indigo"/>
        <StatCard label="Completed"       value={completed.length} icon="✅" color="emerald"/>
        <StatCard label="Overdue"         value={overdue.length} icon="⚠️" color={overdue.length?'red':'indigo'}/>
        {isFounder||isAccounts
          ? <StatCard label="Pending Billing" value={projects.filter(p=>p.status==='completed').length} icon="💰" color="amber"/>
          : <StatCard label="My Leaves"       value={leaves.filter(l=>l.userId===me.id&&l.status==='pending').length} icon="🌿" color="violet"/>
        }
      </div>

      {/* Dept overview (founder only) */}
      {isFounder && (
        <div className="mb-6">
          <h2 className="text-base font-bold text-slate-700 mb-3">Department Overview</h2>
          <div className="grid grid-cols-2 lg:grid-cols-3 gap-3">
            {DEPARTMENTS.map(dept=>{
              const head    = users.find(u=>u.id===dept.headId);
              const dActive = projects.filter(p=>p.assignedDept===dept.id&&['assigned','in_progress'].includes(p.status));
              const dTotal  = projects.filter(p=>p.assignedDept===dept.id);
              const dc      = DEPT_COLORS[dept.color];
              return (
                <div key={dept.id} className={`rounded-2xl border-2 p-4 cursor-pointer hover:shadow-md transition-all ${dc.border} ${dc.bg}`} onClick={()=>nav('projects')}>
                  <p className={`font-bold text-sm ${dc.text}`}>{dept.name}</p>
                  <p className="text-xs text-slate-500 mt-0.5">Head: {head?.name}</p>
                  <div className="flex items-baseline gap-1 mt-3">
                    <span className={`text-2xl font-bold ${dc.text}`}>{dActive.length}</span>
                    <span className="text-xs text-slate-400">/ {dTotal.length} active</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        {/* Active projects */}
        <div>
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-base font-bold text-slate-700">Active Projects</h2>
            <button onClick={()=>nav('projects')} className="text-xs text-indigo-600 hover:underline font-medium">View all →</button>
          </div>
          {active.length===0
            ? <Card className="p-8 text-center text-slate-400 text-sm">No active projects</Card>
            : <div className="space-y-3">{active.slice(0,5).map(p=><MiniProjectCard key={p.id} proj={p} onClick={()=>nav('project',{id:p.id})}/>)}</div>
          }
        </div>

        {/* Right column */}
        <div className="space-y-5">
          {overdue.length>0 && (
            <div>
              <h2 className="text-base font-bold text-red-600 mb-3">⚠ Overdue</h2>
              <div className="space-y-3">{overdue.slice(0,3).map(p=><MiniProjectCard key={p.id} proj={p} onClick={()=>nav('project',{id:p.id})}/>)}</div>
            </div>
          )}
          {(isFounder||isHead) && (
            <div>
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-base font-bold text-slate-700">Pending Leaves</h2>
                <button onClick={()=>nav('leaves')} className="text-xs text-indigo-600 hover:underline">Manage →</button>
              </div>
              {pending.length===0
                ? <Card className="p-5 text-center text-slate-400 text-sm">No pending requests</Card>
                : pending.slice(0,4).map(l=>{
                    const u=users.find(x=>x.id===l.userId);
                    return (
                      <Card key={l.id} className="p-4 mb-2">
                        <div className="flex items-center gap-3">
                          <Av user={u} size="sm"/>
                          <div className="flex-1 min-w-0">
                            <p className="text-sm font-semibold text-slate-700 truncate">{u?.name} — {l.type}</p>
                            <p className="text-xs text-slate-400">{fmtD(l.startDate)} – {fmtD(l.endDate)}</p>
                          </div>
                          <Badge cls={LEAVE_STATUS[l.status]}>Pending</Badge>
                        </div>
                      </Card>
                    );
                  })
              }
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   CREATE / EDIT PROJECT
   ================================================================ */
function CreateProjectPage() {
  const {me, users, params, createProject, updateProject, nav} = useApp();
  const editProj = params.edit || null;
  const isFounder= me.role==='founder';

  const [f,setF] = useState({
    title:       editProj?.title       || '',
    description: editProj?.description || '',
    client:      editProj?.client      || '',
    assignedDept:editProj?.assignedDept|| (me.role==='head'? me.departments[0]:''),
    assignedTo:  editProj?.assignedTo  || '',
    deadline:    editProj?.deadline    || '',
    priority:    editProj?.priority    || 'medium',
    notes:       editProj?.notes       || '',
  });

  const depts      = isFounder ? DEPARTMENTS : DEPARTMENTS.filter(d=>me.departments.includes(d.id));
  const deptMembers= users.filter(u=>u.departments.includes(f.assignedDept)&&u.id!==me.id);
  const sf = (k,v) => setF(x=>({...x,[k]:v}));

  function submit(e) {
    e.preventDefault();
    if(!f.title||!f.assignedDept||!f.deadline) return alert('Please fill: Title, Department, Deadline');
    const data = {...f, assignedTo: f.assignedTo ? parseInt(f.assignedTo) : null};
    editProj ? updateProject(editProj.id, data) : createProject(data);
    nav('projects');
  }

  return (
    <div className="max-w-2xl mx-auto">
      <div className="flex items-center gap-3 mb-6">
        <button onClick={()=>nav('projects')} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-xl">←</button>
        <h1 className="text-xl font-bold text-slate-800">{editProj?'Edit Project':'Create New Project'}</h1>
      </div>
      <Card className="p-6">
        <form onSubmit={submit} className="space-y-5">
          <Inp label="Project Title *" value={f.title} onChange={e=>sf('title',e.target.value)} placeholder="e.g. Brand Campaign for XYZ" required/>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Inp label="Client Name" value={f.client} onChange={e=>sf('client',e.target.value)} placeholder="Client / brand"/>
            <Inp label="Deadline *" type="date" value={f.deadline} onChange={e=>sf('deadline',e.target.value)} required/>
          </div>
          <Txta label="Description" value={f.description} onChange={e=>sf('description',e.target.value)} placeholder="Project brief, scope, and goals..."/>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Sel label="Department *" value={f.assignedDept} onChange={e=>{sf('assignedDept',e.target.value);sf('assignedTo','');}}>
              <option value="">— Select department —</option>
              {depts.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
            </Sel>
            <Sel label="Priority" value={f.priority} onChange={e=>sf('priority',e.target.value)}>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </Sel>
          </div>
          {f.assignedDept && (
            <Sel label="Assign To (optional)" value={f.assignedTo} onChange={e=>sf('assignedTo',e.target.value)}>
              <option value="">Department Head / General</option>
              {deptMembers.map(u=><option key={u.id} value={u.id}>{u.name} — {u.position}</option>)}
            </Sel>
          )}
          <Txta label="Internal Notes" value={f.notes} onChange={e=>sf('notes',e.target.value)} placeholder="Private notes visible to management..."/>
          <div className="flex gap-3 pt-2">
            <Btn type="submit">{editProj?'Update Project':'Create Project'}</Btn>
            <Btn type="button" variant="secondary" onClick={()=>nav('projects')}>Cancel</Btn>
          </div>
        </form>
      </Card>
    </div>
  );
}

/* ================================================================
   PROJECTS LIST
   ================================================================ */
function ProjectsPage() {
  const {me, projects, users, nav, visibleProjects} = useApp();
  const [status,  setStatus]  = useState('all');
  const [dept,    setDept]    = useState('all');
  const [search,  setSearch]  = useState('');
  const isFounder = me.role==='founder';
  const isHead    = me.role==='head';

  const list = projects.filter(visibleProjects).filter(p=>{
    const ms = status==='all'||p.status===status||(status==='overdue'&&isOverdue(p.deadline,p.status));
    const md = dept==='all'||p.assignedDept===dept;
    const mq = !search||p.title.toLowerCase().includes(search.toLowerCase())||(p.client||'').toLowerCase().includes(search.toLowerCase());
    return ms&&md&&mq;
  }).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <h1 className="text-xl font-bold text-slate-800">Projects</h1>
        {(isFounder||isHead) && <Btn onClick={()=>nav('create_project')}>＋ New Project</Btn>}
      </div>

      <Card className="p-3 mb-4">
        <div className="flex flex-wrap gap-2">
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search projects or client..."
            className="flex-1 min-w-40 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
          <select value={status} onChange={e=>setStatus(e.target.value)} className="border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
            <option value="all">All Status</option>
            <option value="assigned">Assigned</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="billed">Billed</option>
            <option value="overdue">Overdue</option>
          </select>
          {isFounder && (
            <select value={dept} onChange={e=>setDept(e.target.value)} className="border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
              <option value="all">All Departments</option>
              {DEPARTMENTS.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
            </select>
          )}
        </div>
      </Card>

      {list.length===0
        ? <Card className="p-12 text-center text-slate-400">No projects found</Card>
        : <div className="space-y-2">
            {list.map(p=>{
              const creator = users.find(u=>u.id===p.createdBy);
              const assignee = p.assignedTo ? users.find(u=>u.id===p.assignedTo) : null;
              const subAssignee = p.subAssignedTo ? users.find(u=>u.id===p.subAssignedTo) : null;
              const d   = DEPARTMENTS.find(x=>x.id===p.assignedDept);
              const ov  = isOverdue(p.deadline,p.status);
              const dl  = daysLeft(p.deadline);
              const dc  = DEPT_COLORS[d?.color||'slate'];
              return (
                <div key={p.id} onClick={()=>nav('project',{id:p.id})}
                  className={`bg-white rounded-2xl border px-4 py-3 flex flex-wrap items-center gap-3 cursor-pointer hover:shadow-md transition-all ${ov?'border-red-200':'border-slate-100 hover:border-indigo-200'}`}>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-semibold text-slate-800 text-sm">{p.title}</span>
                      <StatusBadge status={p.status}/>
                      <PriBadge priority={p.priority}/>
                    </div>
                    {p.client && <p className="text-xs text-slate-400 mt-0.5">Client: {p.client}</p>}
                  </div>
                  <div className="flex items-center gap-3 flex-wrap text-xs">
                    {d && <Badge cls={dc.badge}>{d.name}</Badge>}
                    {creator && <div className="flex items-center gap-1"><Av user={creator} size="sm"/><span className="text-slate-500">By: {creator.name}</span></div>}
                    {assignee && <div className="flex items-center gap-1"><Av user={assignee} size="sm"/><span className="text-slate-500">To: {assignee.name}</span></div>}
                    {subAssignee && <div className="flex items-center gap-1"><Av user={subAssignee} size="sm"/><span className="text-slate-500">Sub: {subAssignee.name}</span></div>}
                    {p.deadline && <span className={`font-medium ${ov?'text-red-500':dl<=3?'text-amber-500':'text-slate-400'}`}>
                      📅 {ov?`${Math.abs(dl)}d late`:dl===0?'Today':`${dl}d`}
                    </span>}
                  </div>
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}

/* ================================================================
   PROJECT DETAIL
   ================================================================ */
function ProjectDetailPage() {
  const {me, projects, progress, users, params, nav, updateProject, markComplete, addProgress, byId} = useApp();
  const proj = projects.find(p=>p.id===params.id);
  const [showProg,    setShowProg]    = useState(false);
  const [progTxt,     setProgTxt]     = useState('');
  const [progPct,     setProgPct]     = useState('');
  const [showSub,     setShowSub]     = useState(false);
  const [subTo,       setSubTo]       = useState('');
  const [showDl,      setShowDl]      = useState(false);
  const [newDl,       setNewDl]       = useState('');

  if (!proj) return (
    <div className="text-center py-16 text-slate-400">
      Project not found. <button className="text-indigo-600 hover:underline" onClick={()=>nav('projects')}>Back to projects</button>
    </div>
  );

  const projProg   = progress.filter(x=>x.projectId===proj.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const latestPct  = projProg.length ? projProg[0].percentage : 0;
  const dept       = DEPARTMENTS.find(d=>d.id===proj.assignedDept);
  const ov         = isOverdue(proj.deadline, proj.status);
  const dl         = daysLeft(proj.deadline);
  const creator    = byId(proj.createdBy);
  const assignee   = proj.assignedTo    ? byId(proj.assignedTo)    : null;
  const subAssignee= proj.subAssignedTo ? byId(proj.subAssignedTo) : null;
  const isFounder  = me.role==='founder';
  const isHead     = me.role==='head';
  const canEdit    = isFounder || isHead;
  const inDept     = isHead && me.departments.includes(proj.assignedDept);
  const canProgress= isFounder || proj.assignedTo===me.id || proj.subAssignedTo===me.id || me.departments.includes(proj.assignedDept);
  const deptMembers= users.filter(u=>u.departments.includes(proj.assignedDept)&&u.id!==me.id&&u.id!==proj.assignedTo);
  const finished   = ['completed','billed'].includes(proj.status);

  function submitProg(e) {
    e.preventDefault();
    if(!progTxt.trim()) return;
    addProgress({projectId:proj.id, text:progTxt, percentage:parseInt(progPct)||latestPct});
    setProgTxt(''); setProgPct(''); setShowProg(false);
  }

  return (
    <div className="max-w-4xl mx-auto">
      <button onClick={()=>nav('projects')} className="flex items-center gap-1 text-sm text-slate-400 hover:text-slate-600 mb-4 group">
        <span className="group-hover:-translate-x-0.5 transition-transform">←</span> Projects
      </button>

      <div className="grid lg:grid-cols-3 gap-5">
        {/* Main */}
        <div className="lg:col-span-2 space-y-4">
          <Card className="p-5">
            <div className="flex items-start justify-between gap-3 flex-wrap mb-3">
              <div className="flex-1 min-w-0">
                <div className="flex flex-wrap items-center gap-2 mb-1">
                  <h1 className="text-xl font-bold text-slate-800">{proj.title}</h1>
                  <StatusBadge status={proj.status}/>
                  <PriBadge priority={proj.priority}/>
                </div>
                {proj.client && <p className="text-sm text-slate-500">Client: <strong className="text-slate-700">{proj.client}</strong></p>}
                {ov && <p className="text-red-500 text-sm font-semibold mt-1">⚠ {Math.abs(dl)} day{Math.abs(dl)!==1?'s':''} overdue</p>}
                {!ov && dl!==null && !finished && <p className={`text-sm font-medium mt-1 ${dl<=3?'text-amber-500':'text-slate-400'}`}>{dl===0?'Due today':`${dl} day${dl!==1?'s':''} remaining`}</p>}
              </div>
              {canEdit && !finished && (
                <Btn variant="secondary" onClick={()=>nav('create_project',{edit:proj})}>Edit</Btn>
              )}
            </div>
            {proj.description && <p className="text-sm text-slate-600 mb-4 leading-relaxed">{proj.description}</p>}
            <ProgBar value={latestPct}/>
          </Card>

          {/* Progress feed */}
          <Card className="p-5">
            <div className="flex items-center justify-between mb-4">
              <h2 className="font-bold text-slate-800">Progress Updates</h2>
              {canProgress && !finished && (
                <Btn variant="ghost" onClick={()=>setShowProg(!showProg)}>＋ Add Update</Btn>
              )}
            </div>

            {showProg && (
              <form onSubmit={submitProg} className="bg-indigo-50 rounded-2xl p-4 mb-4 space-y-3">
                <Txta label="What was done?" value={progTxt} onChange={e=>setProgTxt(e.target.value)} placeholder="Describe today's work..."/>
                <div className="flex items-end gap-3">
                  <div className="flex-1">
                    <Inp label={`Overall % (current: ${latestPct}%)`} type="number" min={0} max={100} value={progPct} onChange={e=>setProgPct(e.target.value)} placeholder={`${latestPct}`}/>
                  </div>
                  <Btn type="submit">Save</Btn>
                  <Btn type="button" variant="secondary" onClick={()=>setShowProg(false)}>Cancel</Btn>
                </div>
              </form>
            )}

            {projProg.length===0
              ? <p className="text-center text-slate-400 text-sm py-6">No updates yet. Be the first to log progress!</p>
              : <div className="space-y-4">
                  {projProg.map(p=>{
                    const u=byId(p.userId);
                    return (
                      <div key={p.id} className="flex gap-3">
                        <Av user={u} size="sm"/>
                        <div className="flex-1 bg-slate-50 rounded-2xl p-3">
                          <div className="flex items-center justify-between mb-1">
                            <span className="font-semibold text-sm text-slate-700">{u?.name}</span>
                            <div className="flex items-center gap-2">
                              <Badge cls="bg-indigo-100 text-indigo-700">{p.percentage}%</Badge>
                              <span className="text-[11px] text-slate-400">{fmtDT(p.createdAt)}</span>
                            </div>
                          </div>
                          <p className="text-sm text-slate-600 leading-relaxed">{p.text}</p>
                        </div>
                      </div>
                    );
                  })}
                </div>
            }
          </Card>

          {/* Action buttons */}
          {canProgress && !finished && (
            <Card className="p-5">
              <h2 className="font-bold text-slate-800 mb-4">Actions</h2>
              <div className="flex flex-wrap gap-3">
                <Btn variant="success" onClick={()=>{ if(window.confirm('Mark this project as COMPLETED?')) markComplete(proj.id); }}>
                  ✅ Mark Complete
                </Btn>
                {(isHead && inDept && deptMembers.length>0) && (
                  <Btn variant="secondary" onClick={()=>setShowSub(!showSub)}>👤 Sub-assign to Member</Btn>
                )}
                {isFounder && (
                  <Btn variant="secondary" onClick={()=>{ setNewDl(proj.deadline||''); setShowDl(!showDl); }}>📅 Change Deadline</Btn>
                )}
              </div>
              {showSub && (
                <div className="mt-4 flex flex-wrap items-end gap-3">
                  <div className="flex-1 min-w-40">
                    <Sel label="Assign to" value={subTo} onChange={e=>setSubTo(e.target.value)}>
                      <option value="">— Select member —</option>
                      {deptMembers.map(u=><option key={u.id} value={u.id}>{u.name} — {u.position}</option>)}
                    </Sel>
                  </div>
                  <Btn onClick={()=>{ if(!subTo) return; updateProject(proj.id,{subAssignedTo:parseInt(subTo)}); setShowSub(false); }}>Assign</Btn>
                  <Btn variant="secondary" onClick={()=>setShowSub(false)}>Cancel</Btn>
                </div>
              )}
              {showDl && (
                <div className="mt-4 flex flex-wrap items-end gap-3">
                  <div className="flex-1 min-w-40"><Inp label="New Deadline" type="date" value={newDl} onChange={e=>setNewDl(e.target.value)}/></div>
                  <Btn onClick={()=>{ if(!newDl) return; updateProject(proj.id,{deadline:newDl}); setShowDl(false); }}>Update</Btn>
                  <Btn variant="secondary" onClick={()=>setShowDl(false)}>Cancel</Btn>
                </div>
              )}
            </Card>
          )}
        </div>

        {/* Sidebar */}
        <div className="space-y-4">
          <Card className="p-5">
            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Project Details</h3>
            <dl className="space-y-3 text-sm">
              {dept && <div><dt className="text-slate-400 text-xs mb-0.5">Department</dt><dd><Badge cls={DEPT_COLORS[dept.color]?.badge}>{dept.name}</Badge></dd></div>}
              <div>
                <dt className="text-slate-400 text-xs mb-0.5">Deadline</dt>
                <dd className={`font-semibold ${ov?'text-red-500':'text-slate-700'}`}>{fmtD(proj.deadline)}{ov?' ⚠':''}</dd>
              </div>
              <div>
                <dt className="text-slate-400 text-xs mb-0.5">Created by</dt>
                <dd className="flex items-center gap-2 mt-0.5"><Av user={creator} size="sm"/><span className="font-medium text-slate-700">{creator?.name}</span></dd>
              </div>
              {assignee && <div>
                <dt className="text-slate-400 text-xs mb-0.5">Assigned to</dt>
                <dd className="flex items-center gap-2 mt-0.5"><Av user={assignee} size="sm"/><span className="font-medium text-slate-700">{assignee.name}</span></dd>
              </div>}
              {subAssignee && <div>
                <dt className="text-slate-400 text-xs mb-0.5">Working on it</dt>
                <dd className="flex items-center gap-2 mt-0.5"><Av user={subAssignee} size="sm"/><span className="font-medium text-slate-700">{subAssignee.name}</span></dd>
              </div>}
              {proj.notes && <div>
                <dt className="text-slate-400 text-xs mb-0.5">Notes</dt>
                <dd className="text-slate-600 leading-relaxed">{proj.notes}</dd>
              </div>}
              <div><dt className="text-slate-400 text-xs mb-0.5">Created</dt><dd className="text-slate-500">{fmtD(proj.createdAt)}</dd></div>
              {proj.completedAt && <div><dt className="text-slate-400 text-xs mb-0.5">Completed</dt><dd className="text-emerald-600 font-medium">{fmtD(proj.completedAt)}</dd></div>}
              {proj.billedAt    && <div><dt className="text-slate-400 text-xs mb-0.5">Billed</dt><dd className="text-violet-600 font-medium">{fmtD(proj.billedAt)}</dd></div>}
            </dl>
          </Card>

          {/* Timeline */}
          {projProg.length>0 && (
            <Card className="p-5">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Progress Timeline</h3>
              <div className="relative">
                <div className="absolute left-2.5 top-0 bottom-0 w-0.5 bg-slate-100"/>
                <div className="space-y-4">
                  {[...projProg].reverse().map((p,i)=>{
                    const u=byId(p.userId);
                    return (
                      <div key={p.id} className="flex gap-3 relative">
                        <div className="w-5 h-5 rounded-full bg-indigo-500 flex-shrink-0 flex items-center justify-center z-10 mt-0.5">
                          <div className="w-2 h-2 bg-white rounded-full"/>
                        </div>
                        <div className="flex-1 min-w-0 pb-1">
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <span className="text-xs font-semibold text-slate-700">{u?.name}</span>
                            <Badge cls="bg-indigo-100 text-indigo-700">{p.percentage}%</Badge>
                          </div>
                          <p className="text-[11px] text-slate-400 mt-0.5">{fmtD(p.date)}</p>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

      </div>

  );
}

   ATTENDANCE
   ================================================================ */
function AttendancePage() {
  const {me, users, att, saveAttendance} = useApp();
  const [selDate, setSelDate] = useState(today());
  const [editU,   setEditU]   = useState(null);
  const [form,    setForm]    = useState({status:'present',checkIn:'09:00',checkOut:'17:00'});
  const isFounder  = me.role==='founder';
  const canManage  = isFounder || me.role==='accounts' || me.role==='head';
  const getA = (uid, date) => att.find(a=>a.userId===uid&&a.date===date);
  const myHist = att.filter(a=>a.userId===me.id).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);

  function openEdit(u) {
    const existing = getA(u.id, selDate);
    setForm({status:existing?.status||'present', checkIn:existing?.checkIn||'09:00', checkOut:existing?.checkOut||'17:00'});
    setEditU(u);
  }

  function save() {
    saveAttendance({userId:editU.id, date:selDate, ...form, markedBy:me.id});
    setEditU(null);
  }

  // Summary counts for selected date
  const dayAtt = att.filter(a=>a.date===selDate);
  const presentCount = dayAtt.filter(a=>a.status==='present').length;
  const absentCount  = dayAtt.filter(a=>a.status==='absent').length;
  const leaveCount   = dayAtt.filter(a=>a.status==='on_leave').length;

  return (
    <div>
      <h1 className="text-xl font-bold text-slate-800 mb-5">Attendance</h1>

/* ================================================================
   LEAVES
   ================================================================ */
function LeavesPage() {
  const {me, users, leaves, applyLeave, decideLeave} = useApp();
  const [showForm, setShowForm] = useState(false);
  const [f, setF] = useState({startDate:'',endDate:'',type:'casual',reason:''});
  const isFounder = me.role==='founder';
  const isHead    = me.role==='head';
  const canApprove= isFounder||isHead;
  const sf = (k,v) => setF(x=>({...x,[k]:v}));

  // Leaves to approve: founder sees all pending, head sees direct reports
  const toApprove = leaves.filter(l=>{
    if (l.status!=='pending') return false;
    if (isFounder) return true;
    const u=users.find(x=>x.id===l.userId);
    return u?.reportingTo===me.id;
  }).sort((a,b)=>new Date(b.appliedAt)-new Date(a.appliedAt));

  const myLeaves = leaves.filter(l=>l.userId===me.id).sort((a,b)=>new Date(b.appliedAt)-new Date(a.appliedAt));

  function submit(e) {
    e.preventDefault();
    if(!f.startDate||!f.endDate||!f.reason.trim()) return alert('Please fill all fields');
    if(f.startDate>f.endDate) return alert('End date must be after start date');
    applyLeave(f);
    setF({startDate:'',endDate:'',type:'casual',reason:''});
    setShowForm(false);
  }

  function days(l) { return Math.ceil((new Date(l.endDate)-new Date(l.startDate))/86400000)+1; }

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <h1 className="text-xl font-bold text-slate-800">Leaves</h1>
        <Btn onClick={()=>setShowForm(!showForm)}>＋ Apply for Leave</Btn>
      </div>

      {showForm && (
        <Card className="p-5 mb-6">
          <h2 className="font-bold text-slate-800 mb-4">New Leave Application</h2>
          <form onSubmit={submit} className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <Inp label="From *" type="date" value={f.startDate} onChange={e=>sf('startDate',e.target.value)} required/>
              <Inp label="To *"   type="date" value={f.endDate}   onChange={e=>sf('endDate',  e.target.value)} required/>
            </div>
            <Sel label="Leave Type" value={f.type} onChange={e=>sf('type',e.target.value)}>
              <option value="casual">Casual Leave</option>
              <option value="sick">Sick Leave</option>
              <option value="annual">Annual Leave</option>
              <option value="unpaid">Unpaid Leave</option>
            </Sel>
            <Txta label="Reason *" value={f.reason} onChange={e=>sf('reason',e.target.value)} placeholder="Please provide reason for leave..." required/>
            <div className="flex gap-3">
              <Btn type="submit">Submit Application</Btn>
              <Btn type="button" variant="secondary" onClick={()=>setShowForm(false)}>Cancel</Btn>
            </div>
          </form>
        </Card>
      )}

      {canApprove && toApprove.length>0 && (
        <div className="mb-8">
          <h2 className="font-bold text-slate-700 mb-3">Pending Approvals ({toApprove.length})</h2>
          <div className="space-y-3">
            {toApprove.map(l=>{
              const u=users.find(x=>x.id===l.userId);
              const d=days(l);
              return (
                <Card key={l.id} className="p-4">
                  <div className="flex items-start gap-3">
                    <Av user={u}/>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap mb-1">
                        <span className="font-bold text-slate-800">{u?.name}</span>
                        <Badge cls={LEAVE_STATUS[l.status]}>{l.status}</Badge>
                        <Badge cls="bg-slate-100 text-slate-600">{l.type} leave</Badge>
                      </div>
                      <p className="text-sm text-slate-600">{fmtD(l.startDate)} – {fmtD(l.endDate)} <span className="text-slate-400">({d} day{d!==1?'s':''})</span></p>
                      <p className="text-sm text-slate-500 mt-1 italic">"{l.reason}"</p>
                    </div>
                    <div className="flex gap-2 flex-shrink-0">
                      <Btn variant="success" onClick={()=>decideLeave(l.id,'approved')}>Approve</Btn>
                      <Btn variant="danger"  onClick={()=>decideLeave(l.id,'rejected')}>Reject</Btn>
                    </div>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      <div>
        <h2 className="font-bold text-slate-700 mb-3">My Leave History</h2>
        {myLeaves.length===0
          ? <Card className="p-8 text-center text-slate-400 text-sm">No leave applications found</Card>
          : <div className="space-y-3">
              {myLeaves.map(l=>{
                const d=days(l);
                const approver=l.approvedBy?users.find(u=>u.id===l.approvedBy):null;
                return (
                  <Card key={l.id} className="p-4">
                    <div className="flex items-start justify-between gap-3">
                      <div className="flex-1">
                        <div className="flex items-center gap-2 flex-wrap mb-1">
                          <span className="font-semibold text-slate-800 capitalize">{l.type} Leave</span>
                          <Badge cls={LEAVE_STATUS[l.status]}>{l.status}</Badge>
                        </div>
                        <p className="text-sm text-slate-600">{fmtD(l.startDate)} – {fmtD(l.endDate)} · {d} day{d!==1?'s':''}</p>
                        <p className="text-sm text-slate-500 mt-1 italic">"{l.reason}"</p>
                        {approver && <p className="text-xs text-slate-400 mt-1">{l.status} by {approver.name}</p>}
                      </div>
                      <span className="text-xs text-slate-400 flex-shrink-0">{fmtD(l.appliedAt)}</span>
                    </div>
                  </Card>
                );
              })}
            </div>
        }
      </div>
    </div>
  );
}

   ================================================================ */
function InvoicePage() {
  const {settings, projects, updateProject, nav, params} = useApp();
  const proj = projects.find(p=>p.id===params.id);
  
  if (!proj) return <div className="p-8 text-center text-slate-500">Project not found.</div>;

  const defaultInvoiceData = {
    billTo: proj.client || '',
    billToAddress: '',
    billToContact: '',
    billToPos: '',
    billToGst: '',
    invoiceNo: `AM(${new Date().getFullYear().toString().slice(-2)}-${(new Date().getFullYear()+1).toString().slice(-2)})-055`,
    date: fmtD(proj.billedAt || today()),
    items: [{id:Date.now(), particulars: proj.title, hsn:'', qty: 1, unitPrice: 0, gst: 18}]
  };

  const invoiceData = proj.invoiceData || defaultInvoiceData;

  const [inv, setInv] = useState(invoiceData);
  const [editing, setEditing] = useState(!proj.invoiceData);
  const pdfRef = useRef();

  const handleItemChange = (idx, field, val) => {
    const newItems = [...inv.items];
    newItems[idx][field] = val;
    setInv({...inv, items: newItems});
  };

  const addItem = () => {
    setInv({...inv, items: [...inv.items, {id:Date.now(), particulars:'', hsn:'', qty:1, unitPrice:0, gst:18}]});
  };

  const removeItem = (idx) => {
    const newItems = [...inv.items];
    newItems.splice(idx,1);
    setInv({...inv, items: newItems});
  };

  const saveInvoice = () => {
    updateProject(proj.id, {invoiceData: inv});
    setEditing(false);
  };

  const downloadPdf = () => {
    const element = pdfRef.current;
    if(!window.html2pdf) { alert('html2pdf library is loading, please try again.'); return; }
    const opt = {
      margin:       0.3,
      filename:     `Invoice_${inv.invoiceNo}.pdf`,
      image:        { type: 'jpeg', quality: 0.98 },
      html2canvas:  { scale: 2 },
      jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
    };
    window.html2pdf().set(opt).from(element).save();
  };

  let subtotal = 0;
  let totalGst = 0;
  let totalQty = 0;
  inv.items.forEach(it => {
    const qty = parseFloat(it.qty) || 0;
    const price = parseFloat(it.unitPrice) || 0;
    const gstRate = parseFloat(it.gst) || 0;
    const amt = qty * price;
    subtotal += amt;
    totalGst += (amt * gstRate) / 100;
    totalQty += qty;
  });
  
  const grandTotalExact = subtotal + totalGst;
  const grandTotalRounded = Math.round(grandTotalExact);
  const roundOff = (grandTotalRounded - grandTotalExact).toFixed(2);
  const cgst = (totalGst / 2).toFixed(2);
  const sgst = (totalGst / 2).toFixed(2);

  const numToWords = (num) => {
    if(num===0) return 'Zero';
    const a = ['','One ','Two ','Three ','Four ','Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
    const b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
    const n = ('000000000' + num).slice(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
    if (!n) return '';
    let str = '';
    str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
    str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
    str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
    str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
    str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Only' : 'Only';
    return str.trim();
  };

  return (
    <div className="max-w-4xl mx-auto">
      <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 gap-4">
        <div className="flex items-center gap-3">
          <button onClick={()=>nav('billing')} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-xl flex-shrink-0">←</button>
          <h1 className="text-xl font-bold text-slate-800 line-clamp-1">Invoice: {proj.title}</h1>
        </div>
        <div className="flex gap-2 flex-shrink-0">
          {editing ? (
            <>
              <Btn variant="secondary" onClick={()=>proj.invoiceData ? setEditing(false) : nav('billing')}>Cancel</Btn>
              <Btn variant="success" onClick={saveInvoice}>Save Data</Btn>
            </>
          ) : (
            <>
              <Btn variant="secondary" onClick={()=>setEditing(true)}>Edit Invoice</Btn>
              <Btn onClick={downloadPdf} className="bg-indigo-600 hover:bg-indigo-700 text-white">⬇ Download PDF</Btn>
            </>
          )}
        </div>
      </div>

      {editing ? (
        <Card className="p-6 mb-6">
          <h2 className="font-bold text-slate-700 mb-4">Invoice Details</h2>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
            <Inp label="Invoice No." value={inv.invoiceNo} onChange={e=>setInv({...inv,invoiceNo:e.target.value})} />
            <Inp label="Date" value={inv.date} onChange={e=>setInv({...inv,date:e.target.value})} />
            <Inp label="Bill To Name" value={inv.billTo} onChange={e=>setInv({...inv,billTo:e.target.value})} />
            <Inp label="Bill To Address" value={inv.billToAddress} onChange={e=>setInv({...inv,billToAddress:e.target.value})} />
            <Inp label="Contact" value={inv.billToContact} onChange={e=>setInv({...inv,billToContact:e.target.value})} />
            <Inp label="PoS" value={inv.billToPos} onChange={e=>setInv({...inv,billToPos:e.target.value})} />
            <Inp label="GSTIN" value={inv.billToGst} onChange={e=>setInv({...inv,billToGst:e.target.value})} />
          </div>
          
          <h3 className="font-semibold text-slate-600 mb-3 border-b pb-2">Line Items</h3>
          <div className="space-y-3">
            {inv.items.map((it, idx) => (
              <div key={it.id} className="flex flex-wrap sm:flex-nowrap gap-2 items-end bg-slate-50 p-3 rounded-lg border border-slate-100">
                <div className="w-full sm:flex-1"><Inp label={idx===0?"Particulars":""} value={it.particulars} onChange={e=>handleItemChange(idx,'particulars',e.target.value)} /></div>
                <div className="w-[calc(50%-0.25rem)] sm:w-24"><Inp label={idx===0?"HSN":""} value={it.hsn} onChange={e=>handleItemChange(idx,'hsn',e.target.value)} /></div>
                <div className="w-[calc(50%-0.25rem)] sm:w-20"><Inp label={idx===0?"Qty":""} type="number" value={it.qty} onChange={e=>handleItemChange(idx,'qty',e.target.value)} /></div>
                <div className="w-[calc(50%-0.25rem)] sm:w-24"><Inp label={idx===0?"Price":""} type="number" value={it.unitPrice} onChange={e=>handleItemChange(idx,'unitPrice',e.target.value)} /></div>
                <div className="w-[calc(50%-0.25rem)] sm:w-20"><Inp label={idx===0?"GST %":""} type="number" value={it.gst} onChange={e=>handleItemChange(idx,'gst',e.target.value)} /></div>
                <button type="button" onClick={()=>removeItem(idx)} className="h-[38px] w-full sm:w-auto px-3 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 mt-2 sm:mt-0 flex items-center justify-center font-bold">X</button>
              </div>
            ))}
          </div>
          <Btn type="button" variant="secondary" onClick={addItem} className="text-sm mt-3">＋ Add Item</Btn>
        </Card>
      ) : (
        <Card className="p-8 overflow-x-auto bg-gray-200 flex justify-center shadow-inner">
          <div ref={pdfRef} className="bg-white text-black" style={{width:'800px', minWidth:'800px', padding:'20px', fontFamily:'Arial, sans-serif'}}>
            {/* Header */}
            <div className="flex justify-between items-center mb-1">
              <div className="font-bold text-[13px] tracking-wide ml-[40%]">TAX INVOICE</div>
              <div className="text-[11px] text-gray-700">(Original Copy)</div>
            </div>
            
            <div className="border border-black flex flex-col h-full">
              {/* Office Header */}
              <div className="flex border-b border-black p-4">
                <div className="w-[45%] flex items-center justify-start pl-2">
                  {settings.logoUrl ? <img src={settings.logoUrl} alt="Logo" className="max-h-16 object-contain" /> : <div className="text-red-600 font-bold text-2xl tracking-tighter">ASSOCIATED MEDIA</div>}
                </div>
                <div className="w-[55%] text-right text-[12px] leading-snug">
                  <h1 className="text-lg font-bold mb-0.5 tracking-tight uppercase">{settings.officeName || 'ASSOCIATED MEDIA'}</h1>
                  <p>{(settings.address || '2nd Floor Mohiddin Trust Building\nResidency Road Opp HDFC Bank Srinagar, 190001').split('\n').map((l,i)=><React.Fragment key={i}>{l}<br/></React.Fragment>)}</p>
                  <p className="mt-2 text-[11px]">Contact : {settings.phone || '0194-2479356, 0194-2477584'}</p>
                  <p className="text-[11px]">Email : {settings.email || 'solutions@associatedmedia.org'}</p>
                  <p className="text-[11px]">Website : {settings.website || 'www.associatedmedia.org'}</p>
                  <p className="mt-2 text-[11px]">GSTIN : {settings.gst || '01AAPFA8124N2ZA'} / PAN NO : {settings.pan || 'AAPFA8124N'}</p>
                </div>
              </div>

              {/* Bill To & Invoice Info */}
              <div className="flex">
                <div className="w-[65%] border-r border-black p-0">
                  <div className="bg-[#2563eb] text-white font-bold p-1 text-[13px] border-b border-black pl-2">Bill To :</div>
                  <div className="p-3">
                    <div className="font-bold uppercase text-[13px] mb-1">{inv.billTo}</div>
                    <div className="text-[12px] whitespace-pre-wrap">{inv.billToAddress}</div>
                    <div className="flex text-[11px] mt-4 gap-4">
                      {inv.billToContact && <div>Contact: {inv.billToContact}</div>}
                      {inv.billToPos && <div>PoS : {inv.billToPos}</div>}
                      {inv.billToGst && <div>GSTIN : {inv.billToGst}</div>}
                    </div>
                  </div>
                </div>
                <div className="w-[35%] text-[12px] flex flex-col bg-white">
                  <div className="flex p-3 pt-4">
                    <div className="w-24">Invoice No.</div><div>: <b>{inv.invoiceNo}</b></div>
                  </div>
                  <div className="flex p-3 pt-0">
                    <div className="w-24">Date</div><div>: <b>{inv.date}</b></div>
                  </div>
                </div>
              </div>

              {/* Table Header */}
              <div className="flex bg-[#2563eb] text-white font-bold text-center text-[11px] border-t border-b border-black items-stretch">
                <div className="w-12 border-r border-black p-1.5 flex items-center justify-center">S.No.</div>
                <div className="flex-1 border-r border-black p-1.5 flex items-center justify-center">PARTICULARS</div>
                <div className="w-20 border-r border-black p-1.5 flex items-center justify-center">HSN/SAC</div>
                <div className="w-16 border-r border-black p-1.5 flex items-center justify-center">QTY</div>
                <div className="w-24 border-r border-black p-1.5 flex items-center justify-center">UNIT PRICE</div>
                <div className="w-14 border-r border-black p-1.5 flex items-center justify-center">GST</div>
                <div className="w-24 p-1.5 flex items-center justify-center">AMOUNT</div>
              </div>

              {/* Table Items */}
              <div className="min-h-[160px] flex text-[12px] items-stretch">
                <div className="w-12 border-r border-black text-center pt-3 pb-3">
                  {inv.items.map((it,i) => <div key={it.id} className="mb-2">{i+1}</div>)}
                </div>
                <div className="flex-1 border-r border-black pt-3 pb-3 pl-2 pr-2">
                  {inv.items.map((it,i) => <div key={it.id} className="font-bold mb-2">{it.particulars}</div>)}
                </div>
                <div className="w-20 border-r border-black text-center pt-3 pb-3">
                  {inv.items.map((it,i) => <div key={it.id} className="mb-2">{it.hsn}</div>)}
                </div>
                <div className="w-16 border-r border-black text-center pt-3 pb-3">
                  {inv.items.map((it,i) => <div key={it.id} className="mb-2">{it.qty} {it.particulars.toLowerCase().includes('flex')?'Sqft':''}</div>)}
                </div>
                <div className="w-24 border-r border-black text-right pt-3 pb-3 pr-2">
                  {inv.items.map((it,i) => <div key={it.id} className="mb-2">₹ {parseFloat(it.unitPrice||0).toFixed(2)}</div>)}
                </div>
                <div className="w-14 border-r border-black text-center pt-3 pb-3">
                  {inv.items.map((it,i) => <div key={it.id} className="mb-2">{it.gst}%</div>)}
                </div>
                <div className="w-24 text-right pt-3 pb-3 pr-2 font-bold">
                  {inv.items.map((it,i) => <div key={it.id} className="mb-2">₹ {(parseFloat(it.qty||0)*parseFloat(it.unitPrice||0)).toFixed(2)}</div>)}
                </div>
              </div>

              {/* Totals */}
              <div className="flex border-t border-black text-[12px]">
                <div className="w-[65%] border-r border-black p-0">
                  <div className="flex justify-between font-bold p-2">
                    <span>Delivery Terms :</span>
                    <span>Total Qty : {totalQty}</span>
                  </div>
                </div>
                <div className="w-[35%] p-2">
                  <div className="flex justify-between font-bold mb-1">
                    <span>Sub Total</span><span>₹ {subtotal.toFixed(2)}</span>
                  </div>
                  {inv.items.length > 0 && (
                    <>
                      <div className="flex justify-between text-[11px] mb-1">
                        <span>Add CGST ({(inv.items[0]?.gst||18)/2}%)</span><span>₹ {cgst}</span>
                      </div>
                      <div className="flex justify-between text-[11px] mb-1">
                        <span>Add SGST ({(inv.items[0]?.gst||18)/2}%)</span><span>₹ {sgst}</span>
                      </div>
                    </>
                  )}
                  <div className="flex justify-between text-[11px]">
                    <span>Round Off ({roundOff >= 0 ? '+' : ''})</span><span>₹ {roundOff}</span>
                  </div>
                </div>
              </div>

              <div className="flex border-t border-b border-black text-[13px]">
                <div className="w-[65%] border-r border-black p-0">
                  <div className="bg-[#2563eb] text-white font-bold p-1 border-b border-black pl-2">Invoice Amount in Words</div>
                  <div className="p-2">Rupees {numToWords(grandTotalRounded)}</div>
                </div>
                <div className="w-[35%] flex flex-col p-0">
                  <div className="bg-[#2563eb] text-white font-bold p-2 text-base flex items-center justify-between h-full">
                    <span>TOTAL</span> <span>₹ {grandTotalRounded.toFixed(2)}</span>
                  </div>
                </div>
              </div>

              {/* Footer */}
              <div className="flex text-[11px]">
                <div className="w-[65%] border-r border-black p-0">
                  <div className="bg-[#2563eb] text-white font-bold p-1 border-b border-black pl-2 mb-2">Terms / Declaration</div>
                  <div className="p-2">
                    <p className="mb-4">This is a computer generated invoice requires no signature.</p>
                    <p>Bank Details -</p>
                    <p>Bank Name : {settings.bankName || 'Jammu and Kashmir Bank'}</p>
                    <p>Account No. : {settings.accountNo || '1112020100000147'}</p>
                    <p>Branch & IFSC : {settings.branchIfsc || 'JAKA0POLOVW'}</p>
                  </div>
                </div>
                <div className="w-[35%] p-2 flex flex-col justify-between items-end relative">
                  <div className="mt-8 mr-12 opacity-30 pointer-events-none">
                     <div className="w-16 h-16 border-2 border-purple-800 text-purple-800 rounded-full flex items-center justify-center text-[10px] transform -rotate-12 select-none">
                        <div className="text-center leading-tight">ASSOCIATED<br/>MEDIA</div>
                     </div>
                  </div>
                  <div className="text-[10px] font-bold pb-1 text-right w-full mt-4">For, {settings.officeName || 'ASSOCIATED MEDIA'}</div>
                </div>
              </div>
            </div>
            
            <div className="text-right text-[10px] text-gray-500 mt-1">Powered By Hitech BillSoft</div>
          </div>
        </Card>
      )}
    </div>
  );
}

/* ================================================================
   ROUTER + APP
   ================================================================ */
function Pages() {
  const {me, page, params} = useApp();
  if (!me) return <LoginPage/>;

  const render = () => {
    switch(page) {
      case 'dashboard':      return <DashboardPage/>;
      case 'projects':       return <ProjectsPage/>;
      case 'create_project': return <CreateProjectPage/>;
      case 'project':        return <ProjectDetailPage/>;
      case 'attendance':     return <AttendancePage/>;
      case 'leaves':         return <LeavesPage/>;
      case 'team':           return <TeamPage/>;
      case 'billing':        return <BillingPage/>;
      case 'settings':       return <SettingsPage/>;
      case 'invoice':        return <InvoicePage/>;
      default:               return <DashboardPage/>;
    }
  };

  return <Layout>{render()}</Layout>;
}

function App() {
  useEffect(()=>{ seed(); },[]);
  return <AppProvider><Pages/></AppProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
